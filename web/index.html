<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>MTG Turing Machine</title>
    <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
<div id="app">
    <header class="hud">
        <div class="hud-left">
            <div class="brand">MTG Turing Machine</div>
            <div class="hud-stats">
                <span class="pill" id="hud-step">STEP: -</span>
                <span class="pill" id="hud-state">STATE: -</span>
                <span class="pill" id="hud-head">HEAD: -</span>
                <span class="pill" id="hud-halted">HALTED: -</span>
            </div>
        </div>

        <div class="hud-right">
            <select id="scenarioSelect" title="Scenario"></select>
            <button id="btnReset">Reset</button>
            <button id="btnFrame">Step frame</button>
            <button id="btnStep">Step step</button>

            <div class="hud-group">
                <button id="btnPlay">Play</button>
                <button id="btnStop" disabled>Stop</button>
            </div>
            <label class="inline">
                Speed
                <input id="speed" type="range" min="0" max="100" value="100"/>
            </label>


            <label class="inline">
                Radius
                <input id="radius" type="range" min="3" max="7" value="3"/>
            </label>
        </div>
    </header>

    <main class="playmat">
        <aside class="sidebar-left">
            <section class="zone graveyard">
                <div class="zone-title">GRAVEYARD</div>
                <div id="graveyardList" class="pile"></div>
            </section>

            <section class="zone stack">
                <div class="zone-title">STACK</div>
                <div id="stackPile" class="pile"></div>
            </section>
        </aside>

        <section class="zone battlefield">
            <div class="zone-title">BATTLEFIELD (BOB)</div>
            <div id="bobPermanentsRow" class="battlefield-row" style="min-height: 180px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); background: rgba(0, 0, 0, 0.1);"></div>
            <div id="battlefieldRow" class="battlefield-row"></div>
            <div class="zone-title" style="margin-top: 20px;">BATTLEFIELD (ALICE)</div>
            <div id="aliceBattlefieldRow" class="battlefield-row" style="min-height: 180px;"></div>
        </section>

        <section class="zone log">
            <div class="zone-title" style="flex: 0 0 auto;">NARRATION</div>
            <div id="logLines" class="log-lines"></div>
            <div class="zone-title" style="margin-top: 15px; flex: 0 0 auto;">DECK</div>
            <div id="deckPile" class="deck-pile"></div>
        </section>
    </main>

    <div id="handZone" class="hand-zone"></div>

    <footer class="statusbar">
        <span id="connStatus">Connecting…</span>
        <span id="lastPhase"></span>
        <span class="spacer"></span>
        <span class="hint">Camera auto-follows head (adjust Radius to see more/less tape).</span>
    </footer>
</div>

<script src="/static/app.js"></script>
</body>
</html>
